<!DOCTYPE html>
<html>
<head>
    <title>Resume Database</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h2 class="text-center text-primary">
Resume Database
</h2>

<hr>

<table class="table table-bordered table-striped table-hover">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Skills</th>
<th>Action</th>
</tr>

</thead>

<tbody>

{% for row in data %}

<tr>

<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
<td>{{ row[4] }}</td>
<td>
    <a href="/delete/{{ row[0] }}" class="btn btn-danger btn-sm">
        Delete
    </a>
</td>

</tr>

{% endfor %}

</tbody>

</table>

<a href="/" class="btn btn-success">
Upload New Resume
</a>
<a href="/export" class="btn btn-primary">
    Export CSV
</a>

</div>

</div>

</body>
</html>
