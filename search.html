<!DOCTYPE html>
<html>
<head>
    <title>Search Candidate</title>
</head>
<body>

<h2>Search Candidate by Skill</h2>

<form method="POST">
    <input type="text" name="skill" placeholder="Enter Skill">
    <input type="submit" value="Search">
</form>

<hr>

<table border="1">
<tr>
    <th>Name</th>
    <th>Email</th>
    <th>Phone</th>
    <th>Skills</th>
</tr>

{% for row in results %}
<tr>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>
    <td>{{ row[4] }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
